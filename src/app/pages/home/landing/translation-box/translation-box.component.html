@if (emptyRes) {
  <div
    class="translation-area-wrapper mx-auto mt-2 max-w-full text-right md:mt-10"
  >
    <div class="translation-result-area w-full min-w-0 max-w-full">
      <p class="m-0 w-full min-w-0 max-w-full break-words text-right text-sm">
        لسوء الحظ، قاموسنا لا يحتوي على هذه الكلمة. التحقق من الإملاء الخاص بك.
        إذا كان كل شيء صحيحًا وتريد منا أن نضيف هذه الكلمة،
        <span (click)="addWordSuggestion()" class="cursor-pointer text-main">
          انقر هنا.
        </span>
      </p>
    </div>
  </div>
}

<app-suspend *ngIf="loading"></app-suspend>

@for (word of words; track word.id) {
  <div class="translation-area-wrapper mx-auto mt-2 max-w-full">
    <app-translation-result
      *ngIf="words.length"
      [word]="word"
    ></app-translation-result>
  </div>
  <br />
}
